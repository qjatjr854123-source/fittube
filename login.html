<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTube — 로그인</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0033">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTube">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="login.css">
</head>
<body class="login-body">

  <!-- 배경 효과 -->
  <div class="login-bg-circle login-bg-circle-1"></div>
  <div class="login-bg-circle login-bg-circle-2"></div>
  <div class="login-bg-grid"></div>

  <div class="login-phone">
    <div class="login-inner">

      <!-- 브랜드 헤더 -->
      <div class="login-brand">
        <div class="login-icon-box">
          <svg viewBox="0 0 40 40" width="36" height="36" fill="none">
            <path d="M8 10 L20 6 L32 10 L32 22 Q32 32 20 36 Q8 32 8 22 Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
            <path d="M16 18 L16 26 L26 22 Z" fill="#fff"/>
          </svg>
        </div>
        <div class="login-brand-text">
          <div class="login-logo">FitTube</div>
          <div class="login-tagline">AI 체형 분석 · 맞춤 운동 플랜</div>
        </div>
      </div>

      <!-- 앱 특징 3개 -->
      <div class="login-features">
        <div class="login-feature">
          <span class="lf-icon">💪</span>
          <span class="lf-text">체형 분석</span>
        </div>
        <div class="login-feature-sep"></div>
        <div class="login-feature">
          <span class="lf-icon">📅</span>
          <span class="lf-text">주간 플랜</span>
        </div>
        <div class="login-feature-sep"></div>
        <div class="login-feature">
          <span class="lf-icon">🔥</span>
          <span class="lf-text">운동 streak</span>
        </div>
      </div>

      <!-- 로그인 카드 -->
      <section class="login-card">
        <div class="login-card-title">로그인</div>
        <form id="loginForm" class="login-form" autocomplete="off" onsubmit="return false;">
          <div class="login-field">
            <label for="loginId">이메일</label>
            <div class="login-input-wrap">
              <svg class="login-input-icon" viewBox="0 0 20 20" fill="none">
                <rect x="2" y="5" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
                <path d="M2 8l8 5 8-5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              <input type="email" id="loginId" placeholder="이메일 입력" autocomplete="off">
            </div>
          </div>

          <div class="login-field">
            <label for="loginPw">비밀번호</label>
            <div class="login-input-wrap">
              <svg class="login-input-icon" viewBox="0 0 20 20" fill="none">
                <rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/>
                <path d="M7 9V6.5a3 3 0 0 1 6 0V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="10" cy="13.5" r="1.2" fill="currentColor"/>
              </svg>
              <input type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="off">
            </div>
          </div>

          <div class="login-error" id="loginError" style="display:none;"></div>

          <button type="button" class="login-btn" id="loginBtn">
            <span>로그인</span>
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none">
              <path d="M4 10h12M12 6l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <!-- 구분선 -->
          <div class="login-divider"><span>또는</span></div>

          <!-- 구글 로그인 -->
          <button type="button" class="login-google-btn" id="googleLoginBtn">
            <svg class="g-logo" viewBox="0 0 48 48" width="18" height="18" aria-hidden="true">
              <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 4.5 29.5 2.5 24 2.5 12.1 2.5 2.5 12.1 2.5 24S12.1 45.5 24 45.5 45.5 35.9 45.5 24c0-1.2-.1-2.4-.4-3.5z"/>
              <path fill="#FF3D00" d="M5 14.7l6.6 4.8C13.4 15.1 18.3 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6 29.5 4 24 4 16 4 9.1 8.5 5 14.7z"/>
              <path fill="#4CAF50" d="M24 44c5.4 0 10.3-1.9 14-5.2l-6.5-5.3c-2 1.5-4.6 2.5-7.5 2.5-5.2 0-9.6-3.3-11.2-7.9l-6.5 5C9 39.4 15.9 44 24 44z"/>
              <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.5 5.3C41.7 35.8 45.5 30.5 45.5 24c0-1.2-.1-2.4-.4-3.5z"/>
            </svg>
            Google로 시작하기
          </button>

          <div class="login-sub-actions">
            <a href="#" class="login-link" id="signupLink">회원가입</a>
            <span class="login-sep">·</span>
            <a href="#" class="login-link" id="forgotLink">비밀번호 찾기</a>
          </div>
        </form>
      </section>

      <!-- 개인정보 안내 -->
      <div class="login-privacy">
        <span class="lp-item"><span>✅</span> 기기에만 저장</span>
        <span class="lp-sep">·</span>
        <span class="lp-item"><span>❌</span> 서버 전송 없음</span>
        <span class="lp-sep">·</span>
        <a href="terms.html" class="login-terms-link">약관</a>
      </div>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="shared.js"></script>
  <script src="login.js"></script>
</body>
</html>
